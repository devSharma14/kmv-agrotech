    <rect x="15.2" y="0.5" width="1.6" height="3.2" rx="0.2" transform="rotate(30 16 16)"/>
    <rect x="15.2" y="0.5" width="1.6" height="3.2" rx="0.2" transform="rotate(60 16 16)"/>
    <rect x="15.2" y="0.5" width="1.6" height="3.2" rx="0.2" transform="rotate(90 16 16)"/>
    <rect x="15.2" y="0.5" width="1.6" height="3.2" rx="0.2" transform="rotate(120 16 16)"/>
    <rect x="15.2" y="0.5" width="1.6" height="3.2" rx="0.2" transform="rotate(150 16 16)"/>
    <rect x="15.2" y="0.5" width="1.6" height="3.2" rx="0.2" transform="rotate(180 16 16)"/>
    <rect x="15.2" y="0.5" width="1.6" height="3.2" rx="0.2" transform="rotate(210 16 16)"/>
    <rect x="15.2" y="0.5" width="1.6" height="3.2" rx="0.2" transform="rotate(240 16 16)"/>
    <rect x="15.2" y="0.5" width="1.6" height="3.2" rx="0.2" transform="rotate(270 16 16)"/>
    <rect x="15.2" y="0.5" width="1.6" height="3.2" rx="0.2" transform="rotate(300 16 16)"/>
    <rect x="15.2" y="0.5" width="1.6" height="3.2" rx="0.2" transform="rotate(330 16 16)"/>
  </g>
  <!-- outer dark ring -->
  <circle cx="16" cy="16" r="13.5" fill="#161616"/>
  <!-- white inner disc -->
  <circle cx="16" cy="16" r="11" fill="#FFFFFF"/>
  <!-- KMV wordmark -->
  <text x="16" y="19.2" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="7.5" font-weight="900" letter-spacing="-0.45" fill="#A92D29">KMV</text>
</svg>
